name: Bug Report
description: Report a bug with the Melitta Barista Card
labels: ["bug"]
body:
  - type: input
    id: card_version
    attributes:
      label: Card version
      placeholder: "e.g. 2.0.0"
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2026.3.1"
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Melitta Barista Smart integration version
      placeholder: "e.g. 0.27.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: card_config
    attributes:
      label: Card configuration (YAML)
      render: yaml
  - type: textarea
    id: console
    attributes:
      label: Browser console errors
      render: text
